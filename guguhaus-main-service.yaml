apiVersion: v1
kind: Service
metadata:
  name: guguhaus-main-service
  namespace: guguhaus
spec:
  type: NodePort
  selector:
    app: guguhaus-main-app # Deployment의 spec.template.metadata.labels.app 값과 일치
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 32030 # 필요시 특정 NodePort 지정
