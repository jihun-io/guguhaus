apiVersion: apps/v1
kind: Deployment
metadata:
  name: guguhaus-main # Jenkinsfileмқҳ KUBERNETES_DEPLOYMENT_NAMEкіј мқјм№ҳ
  namespace: guguhaus    # Jenkinsfileмқҳ KUBERNETES_NAMESPACEмҷҖ мқјм№ҳ
  labels:
    app: guguhaus-main-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: guguhaus-main-app
  template:
    metadata:
      labels:
        app: guguhaus-main-app
    spec:
      containers:
        - name: guguhaus-main # kubectl set imageмқҳ лҢҖмғҒ м»Ён…Ңмқҙл„Ҳ мқҙлҰ„ (KUBERNETES_DEPLOYMENT_NAMEкіј лҸҷмқјн•ҳкІҢ к°Җм •)
          image: kimjihunio/guguhaus-main:initial # м  нӮЁмҠӨк°Җ мІ« л№Ңл“ң нӣ„ мғқм„ұ/м—…лҚ°мқҙнҠён•  мқҙлҜём§Җмқҳ мҙҲкё° нғңк·ё
          ports:
            - containerPort: 3000
